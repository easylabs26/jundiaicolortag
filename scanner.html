<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>QR Lookup</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: #2a2a2a;
    --accent: #c8f135;
    --accent2: #ff5c5c;
    --text: #f0f0f0;
    --muted: #555;
    --r: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overscroll-behavior: none; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: max(env(safe-area-inset-top), 20px) 20px max(env(safe-area-inset-bottom), 32px);
    overflow-x: hidden;
    overflow-y: auto;
  }

  header {
    width: 100%;
    max-width: 420px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    transition: color 0.3s;
  }
  .status-pill .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s, box-shadow 0.3s;
  }
  .status-pill.active { color: var(--accent); }
  .status-pill.active .dot {
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 4px var(--accent); }
    50%      { box-shadow: 0 0 10px var(--accent); }
  }

  h1 {
    font-size: clamp(2rem, 9vw, 2.8rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: 4px;
    width: 100%;
    max-width: 420px;
  }
  h1 span { color: var(--accent); }

  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-bottom: 20px;
    width: 100%;
    max-width: 420px;
  }

  .scanner-wrap { width: 100%; max-width: 420px; margin-bottom: 16px; }

  .scanner-frame {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: #000;
    border-radius: var(--r);
    overflow: hidden;
    position: relative;
  }

  #camVideo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
    transform: translateZ(0);
  }

  #snapCanvas { display: none; }

  .br { position: absolute; width: 26px; height: 26px; border-color: var(--accent); border-style: solid; z-index: 4; pointer-events: none; }
  .br.tl  { top: 10px; left: 10px;    border-width: 2px 0 0 2px; }
  .br.tr  { top: 10px; right: 10px;   border-width: 2px 2px 0 0; }
  .br.bl  { bottom: 10px; left: 10px; border-width: 0 0 2px 2px; }
  .br.br2 { bottom: 10px; right: 10px;border-width: 0 2px 2px 0; }

  .scan-line {
    position: absolute;
    left: 10px; right: 10px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    top: 10px;
    z-index: 3;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .scanning .scan-line {
    opacity: 1;
    animation: scanMove 2s ease-in-out infinite;
  }
  @keyframes scanMove {
    0%   { top: 10px; }
    100% { top: calc(100% - 10px); }
  }

  .flash {
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    z-index: 5;
    pointer-events: none;
    border-radius: var(--r);
  }
  .flash.go { animation: flashAnim 0.25s ease-out forwards; }
  @keyframes flashAnim { 0% { opacity: 0.35; } 100% { opacity: 0; } }

  .placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    z-index: 2;
    background: var(--surface);
  }
  .placeholder svg { opacity: 0.18; }

  .btn {
    width: 100%;
    max-width: 420px;
    padding: 15px;
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    border-radius: var(--r);
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    margin-bottom: 20px;
    touch-action: manipulation;
  }
  .btn:active { transform: scale(0.97); opacity: 0.8; }
  .btn.stop { background: var(--surface); color: var(--text); border: 1px solid var(--border); }

  .result-card {
    width: 100%;
    max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    overflow: hidden;
    display: none;
    margin-bottom: 16px;
  }
  .result-card.visible { display: block; animation: slideUp 0.3s cubic-bezier(0.16,1,0.3,1); }
  @keyframes slideUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }

  .result-tag {
    padding: 7px 14px;
    background: var(--border);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
  }
  .result-card.error .result-tag { background: rgba(255,92,92,0.12); color: var(--accent2); }

  .loading-bar { height: 2px; background: var(--border); overflow: hidden; display: none; }
  .loading-bar.active { display: block; }
  .loading-bar::after {
    content: '';
    display: block;
    width: 40%;
    height: 100%;
    background: var(--accent);
    animation: lbar 0.9s ease-in-out infinite;
  }
  @keyframes lbar { 0% { margin-left:-40%; } 100% { margin-left:100%; } }

  .result-body { padding: 16px; }

  .result-field {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
  }
  .result-field:last-child { border-bottom: none; }

  .field-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    flex-shrink: 0;
    margin-right: 12px;
  }
  .field-value { font-size: 15px; font-weight: 700; text-align: right; }
  .field-value.mono { font-family: 'Space Mono', monospace; font-size: 13px; }
  .result-card.error .field-value { color: var(--accent2); }

  .color-pill { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
  .swatch { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; }

  .manual-section { width: 100%; max-width: 420px; margin-top: 4px; margin-bottom: 40px; }
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
  }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .input-row { display: flex; gap: 8px; }

  input[type="text"] {
    flex: 1;
    padding: 13px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  .btn-sm {
    padding: 13px 16px;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--r);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    touch-action: manipulation;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-sm:active { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<header>
  <span class="logo">QR // Lookup</span>
  <div class="status-pill" id="statusPill">
    <div class="dot"></div>
    <span id="statusTxt">OFF</span>
  </div>
</header>

<h1>Scan &<br><span>Lookup</span></h1>
<p class="subtitle">// aponte a câmera para o QR code</p>

<div class="scanner-wrap">
  <div class="scanner-frame" id="scannerFrame">
    <div class="br tl"></div><div class="br tr"></div>
    <div class="br bl"></div><div class="br br2"></div>
    <div class="scan-line"></div>
    <div class="flash" id="flashEl"></div>
    <video id="camVideo" autoplay playsinline muted></video>
    <canvas id="snapCanvas"></canvas>
    <div class="placeholder" id="placeholder">
      <svg width="44" height="44" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="6" y="6" width="14" height="14" rx="1"/>
        <rect x="28" y="6" width="14" height="14" rx="1"/>
        <rect x="6" y="28" width="14" height="14" rx="1"/>
        <rect x="9" y="9" width="8" height="8" fill="currentColor" stroke="none" rx="0.5"/>
        <rect x="31" y="9" width="8" height="8" fill="currentColor" stroke="none" rx="0.5"/>
        <rect x="9" y="31" width="8" height="8" fill="currentColor" stroke="none" rx="0.5"/>
        <path d="M28 28h4v4h-4zM36 28h4v4h-4zM32 32h4v4h-4zM28 36h4v4h-4zM36 36h4v4h-4z"/>
      </svg>
      <span>câmera desligada</span>
    </div>
  </div>
</div>

<button class="btn" id="mainBtn" onclick="toggleScanner()">Ligar câmera</button>

<div class="result-card" id="resultCard">
  <div class="result-tag">
    <span>RESULTADO</span>
    <span id="resultTime"></span>
  </div>
  <div class="loading-bar" id="loadingBar"></div>
  <div class="result-body" id="resultBody"></div>
</div>

<div class="manual-section">
  <div class="divider">ou digite o código</div>
  <div class="input-row">
    <input type="text" id="manualInput" placeholder="ex: ABC-001"
      onkeydown="if(event.key==='Enter'){lookupCode(this.value);this.blur();}">
    <button class="btn-sm" onclick="lookupCode(document.getElementById('manualInput').value)">Buscar</button>
  </div>
</div>

<script>
const WEBHOOK_URL = 'https://novo1-n8n.dpxjlg.easypanel.host/webhook/qr-lookup';

let stream    = null;
let scanning  = false;
let lastCode  = null;
let rafId     = null;
let detector  = null;
let jsqrReady = false;

const video      = document.getElementById('camVideo');
const canvas     = document.getElementById('snapCanvas');
const ctx        = canvas.getContext('2d', { willReadFrequently: true });
const frame      = document.getElementById('scannerFrame');
const placeholder= document.getElementById('placeholder');
const btn        = document.getElementById('mainBtn');
const statusPill = document.getElementById('statusPill');
const statusTxt  = document.getElementById('statusTxt');
const flashEl    = document.getElementById('flashEl');

async function initDetector() {
  if ('BarcodeDetector' in window) {
    try { detector = new BarcodeDetector({ formats: ['qr_code'] }); return; } catch(e) {}
  }
  await new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js';
    s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
  jsqrReady = true;
}

async function toggleScanner() {
  scanning ? stopScanner() : await startScanner();
}

async function startScanner() {
  try {
    await initDetector();
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();

    placeholder.style.display = 'none';
    video.style.display = 'block';
    frame.classList.add('scanning');
    btn.textContent = 'Parar câmera';
    btn.classList.add('stop');
    statusPill.classList.add('active');
    statusTxt.textContent = 'ON';
    scanning = true;
    lastCode = null;
    scanLoop();
  } catch(e) {
    showError('Câmera não autorizada. Libere o acesso nas configurações.');
  }
}

function stopScanner() {
  scanning = false;
  cancelAnimationFrame(rafId);
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  video.srcObject = null;
  video.style.display = 'none';
  placeholder.style.display = 'flex';
  frame.classList.remove('scanning');
  btn.textContent = 'Ligar câmera';
  btn.classList.remove('stop');
  statusPill.classList.remove('active');
  statusTxt.textContent = 'OFF';
  lastCode = null;
}

let lastTs = 0;
function scanLoop(ts = 0) {
  if (!scanning) return;
  rafId = requestAnimationFrame(scanLoop);
  if (ts - lastTs < 66) return;
  lastTs = ts;
  if (video.readyState < 2) return;
  decodeFrame();
}

async function decodeFrame() {
  try {
    let code = null;
    if (detector) {
      const r = await detector.detect(video);
      if (r.length) code = r[0].rawValue;
    } else if (jsqrReady) {
      const w = video.videoWidth, h = video.videoHeight;
      canvas.width = w; canvas.height = h;
      ctx.drawImage(video, 0, 0, w, h);
      const img = ctx.getImageData(0, 0, w, h);
      const r = jsQR(img.data, w, h, { inversionAttempts: 'dontInvert' });
      if (r) code = r.data;
    }
    if (code && code !== lastCode) {
      lastCode = code;
      flashEl.classList.remove('go');
      void flashEl.offsetWidth;
      flashEl.classList.add('go');
      navigator.vibrate && navigator.vibrate([60]);
      lookupCode(code);
    }
  } catch(e) {}
}

async function lookupCode(code) {
  if (!code || !code.trim()) return;
  code = code.trim();

  const card = document.getElementById('resultCard');
  const body = document.getElementById('resultBody');
  const bar  = document.getElementById('loadingBar');
  const time = document.getElementById('resultTime');

  card.className = 'result-card visible';
  bar.classList.add('active');
  body.innerHTML = '';
  time.textContent = new Date().toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 120);

  try {
    const res  = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code })
    });
    const data = await res.json();
    bar.classList.remove('active');

    if (!res.ok || data.error) { showError(data.error || 'Código não encontrado.'); return; }

    card.className = 'result-card visible';
    const colorName = data.color || '—';

    body.innerHTML = `
      <div class="result-field">
        <span class="field-label">Código</span>
        <span class="field-value mono">${esc(data.code || code)}</span>
      </div>
      <div class="result-field">
        <span class="field-label">Nome</span>
        <span class="field-value">${esc(data.name || '—')}</span>
      </div>
      <div class="result-field">
        <span class="field-label">Cor</span>
        <span class="field-value color-pill">
          <span class="swatch" style="background:${colorHex(colorName)}"></span>
          ${esc(colorName)}
        </span>
      </div>`;
  } catch(e) {
    document.getElementById('loadingBar').classList.remove('active');
    showError('Sem conexão com o servidor.');
  }
}

function showError(msg) {
  const card = document.getElementById('resultCard');
  document.getElementById('resultBody').innerHTML =
    `<div class="result-field"><span class="field-label">Erro</span><span class="field-value">${esc(msg)}</span></div>`;
  card.className = 'result-card visible error';
}

function colorHex(n) {
  const m = {
    vermelho:'#ff5c5c',red:'#ff5c5c',azul:'#5c9eff',blue:'#5c9eff',
    verde:'#7ed957',green:'#7ed957',amarelo:'#ffe566',yellow:'#ffe566',
    roxo:'#b57bee',purple:'#b57bee',laranja:'#ff9940',orange:'#ff9940',
    branco:'#f0f0f0',white:'#f0f0f0',preto:'#333',black:'#333',
    rosa:'#ff80b5',pink:'#ff80b5',cinza:'#888',gray:'#888',grey:'#888',
  };
  return m[(n||'').toLowerCase()] || '#555';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
