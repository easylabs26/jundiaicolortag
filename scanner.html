<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>QR Lookup</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: #2a2a2a;
    --accent: #c8f135;
    --accent2: #ff5c5c;
    --text: #f0f0f0;
    --muted: #555;
    --r: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overscroll-behavior: none; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: max(env(safe-area-inset-top), 20px) 20px max(env(safe-area-inset-bottom), 32px);
    overflow-x: hidden;
    overflow-y: auto;
  }

  header {
    width: 100%;
    max-width: 420px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    transition: color 0.3s;
  }
  .status-pill .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s, box-shadow 0.3s;
  }
  .status-pill.active { color: var(--accent); }
  .status-pill.active .dot {
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 4px var(--accent); }
    50%      { box-shadow: 0 0 10px var(--accent); }
  }

  h1 {
    font-size: clamp(2rem, 9vw, 2.8rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: 4px;
    width: 100%;
    max-width: 420px;
  }
  h1 span { color: var(--accent); }

  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-bottom: 20px;
    width: 100%;
    max-width: 420px;
  }

  .scanner-wrap { width: 100%; max-width: 420px; margin-bottom: 16px; }

  .scanner-frame {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: #000;
    border-radius: var(--r);
    overflow: hidden;
    position: relative;
  }

  #camVideo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
    transform: translateZ(0);
  }

  #snapCanvas { display: none; }

  .br { position: absolute; width: 26px; height: 26px; border-color: var(--accent); border-style: solid; z-index: 4; pointer-events: none; }
  .br.tl  { top: 10px; left: 10px;    border-width: 2px 0 0 2px; }
  .br.tr  { top: 10px; right: 10px;   border-width: 2px 2px 0 0; }
  .br.bl  { bottom: 10px; left: 10px; border-width: 0 0 2px 2px; }
  .br.br2 { bottom: 10px; right: 10px;border-width: 0 2px 2px 0; }

  .scan-line {
    position: absolute;
    left: 10px; right: 10px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    top: 10px;
    z-index: 3;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .scanning .scan-line {
    opacity: 1;
    animation: scanMove 2s ease-in-out infinite;
  }
  @keyframes scanMove {
    0%   { top: 10px; }
    100% { top: calc(100% - 10px); }
  }

  .flash {
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    z-index: 5;
    pointer-events: none;
    border-radius: var(--r);
  }
  .flash.go { animation: flashAnim 0.25s ease-out forwards; }
