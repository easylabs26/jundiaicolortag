<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QR Scanner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: #2a2a2a;
    --accent: #c8f135;
    --accent2: #ff5c5c;
    --text: #f0f0f0;
    --muted: #555;
    --radius: 4px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 20px 40px;
    overflow-x: hidden;
  }

  /* grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  header {
    width: 100%;
    max-width: 420px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 32px;
    position: relative;
    z-index: 1;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .status-dot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

  h1 {
    font-size: clamp(2.2rem, 8vw, 3rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: 6px;
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-bottom: 32px;
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
  }

  /* Scanner box */
  .scanner-wrap {
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
    margin-bottom: 24px;
  }

  .scanner-frame {
    width: 100%;
    aspect-ratio: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
  }

  /* corner accents */
  .scanner-frame::before,
  .scanner-frame::after {
    content: '';
    position: absolute;
    width: 28px;
    height: 28px;
    border-color: var(--accent);
    border-style: solid;
    z-index: 10;
  }
  .scanner-frame::before { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
  .scanner-frame::after  { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }

  .corner-tr, .corner-bl {
    position: absolute;
    width: 28px;
    height: 28px;
    border-color: var(--accent);
    border-style: solid;
    z-index: 10;
  }
  .corner-tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; }
  .corner-bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; }

  /* scan line animation */
  .scan-line {
    position: absolute;
    left: 12px; right: 12px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    top: 12px;
    z-index: 9;
    animation: scanMove 2.4s ease-in-out infinite;
    display: none;
  }
  .scanning .scan-line { display: block; }

  @keyframes scanMove {
    0%   { top: 12px; opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { top: calc(100% - 12px); opacity: 0; }
  }

  #reader {
    width: 100% !important;
    height: 100% !important;
    position: absolute;
    inset: 0;
  }

  /* hide html5-qrcode default UI clutter */
  #reader > img,
  #reader__scan_region > img { display: none !important; }
  #reader__dashboard { display: none !important; }
  #reader__scan_region { width: 100% !important; height: 100% !important; }
  #reader__scan_region video { width: 100% !important; height: 100% !important; object-fit: cover; }

  /* Placeholder state */
  .placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    z-index: 2;
  }

  .placeholder svg { opacity: 0.2; }

  /* Button */
  .btn {
    width: 100%;
    max-width: 420px;
    padding: 16px;
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    border-radius: var(--radius);
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    position: relative;
    z-index: 1;
    transition: opacity 0.2s, transform 0.1s;
    margin-bottom: 24px;
  }
  .btn:active { transform: scale(0.98); opacity: 0.85; }
  .btn.stop { background: var(--surface); color: var(--text); border: 1px solid var(--border); }

  /* Result card */
  .result-card {
    width: 100%;
    max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
    z-index: 1;
    display: none;
    animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-card.visible { display: block; }

  .result-tag {
    padding: 8px 14px;
    background: var(--border);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
  }

  .result-body {
    padding: 20px 16px;
  }

  .result-field {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .result-field:last-child { border-bottom: none; }

  .field-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .field-value {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .field-value.color-pill {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .color-swatch {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* error */
  .result-card.error .result-tag { background: rgba(255,92,92,0.15); color: var(--accent2); }
  .result-card.error .field-value { color: var(--accent2); }

  /* loading */
  .loading-bar {
    height: 2px;
    background: var(--border);
    position: relative;
    overflow: hidden;
    display: none;
  }
  .loading-bar.active { display: block; }
  .loading-bar::after {
    content: '';
    position: absolute;
    left: -40%;
    width: 40%;
    height: 100%;
    background: var(--accent);
    animation: loading 1s ease-in-out infinite;
  }
  @keyframes loading {
    0%   { left: -40%; }
    100% { left: 100%; }
  }

  /* manual input */
  .manual-section {
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
    margin-top: 8px;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .input-row {
    display: flex;
    gap: 8px;
  }

  input[type="text"] {
    flex: 1;
    padding: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  .btn-small {
    padding: 14px 18px;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    white-space: nowrap;
  }
  .btn-small:hover { border-color: var(--accent); color: var(--accent); }

</style>
</head>
<body>

<header>
  <span class="logo">QR // Lookup</span>
  <div class="status-dot" id="statusDot"></div>
</header>

<h1>Scan &<br><span>Lookup</span></h1>
<p class="subtitle">// aponte a câmera para o QR code</p>

<!-- Scanner -->
<div class="scanner-wrap">
  <div class="scanner-frame" id="scannerFrame">
    <div class="corner-tr"></div>
    <div class="corner-bl"></div>
    <div class="scan-line"></div>
    <div id="reader"></div>
    <div class="placeholder" id="placeholder">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="6" y="6" width="14" height="14" rx="1"/>
        <rect x="28" y="6" width="14" height="14" rx="1"/>
        <rect x="6" y="28" width="14" height="14" rx="1"/>
        <rect x="9" y="9" width="8" height="8" fill="currentColor" stroke="none" rx="0.5"/>
        <rect x="31" y="9" width="8" height="8" fill="currentColor" stroke="none" rx="0.5"/>
        <rect x="9" y="31" width="8" height="8" fill="currentColor" stroke="none" rx="0.5"/>
        <path d="M28 28h4v4h-4zM36 28h4v4h-4zM32 32h4v4h-4zM28 36h4v4h-4zM36 36h4v4h-4z"/>
      </svg>
      <span>câmera desligada</span>
    </div>
  </div>
</div>

<button class="btn" id="mainBtn" onclick="toggleScanner()">Ligar câmera</button>

<!-- Result -->
<div class="result-card" id="resultCard">
  <div class="result-tag">
    <span>RESULTADO</span>
    <span id="resultTime"></span>
  </div>
  <div class="loading-bar" id="loadingBar"></div>
  <div class="result-body" id="resultBody"></div>
</div>

<!-- Manual -->
<div class="manual-section">
  <div class="divider">ou digite o código</div>
  <div class="input-row">
    <input type="text" id="manualInput" placeholder="ex: ABC-001" onkeydown="if(event.key==='Enter') lookupCode(document.getElementById('manualInput').value)">
    <button class="btn-small" onclick="lookupCode(document.getElementById('manualInput').value)">Buscar</button>
  </div>
</div>

<script>
  // ── CONFIG ── troque só esta linha se mudar o webhook
  const WEBHOOK_URL = 'https://novo1-n8n.dpxjlg.easypanel.host/webhook/qr-lookup';

  let scanner = null;
  let scanning = false;
  let lastCode = null;

  function toggleScanner() {
    if (scanning) stopScanner();
    else startScanner();
  }

  function startScanner() {
    const btn = document.getElementById('mainBtn');
    const frame = document.getElementById('scannerFrame');
    const placeholder = document.getElementById('placeholder');
    const dot = document.getElementById('statusDot');

    placeholder.style.display = 'none';
    frame.classList.add('scanning');
    btn.textContent = 'Parar câmera';
    btn.classList.add('stop');
    dot.classList.add('active');
    scanning = true;

    scanner = new Html5Qrcode('reader');
    scanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 220, height: 220 } },
      (code) => {
        if (code !== lastCode) {
          lastCode = code;
          navigator.vibrate && navigator.vibrate(80);
          lookupCode(code);
        }
      },
      () => {}
    ).catch(err => {
      showError('Câmera não autorizada. Libere o acesso nas configurações.');
      stopScanner();
    });
  }

  function stopScanner() {
    const btn = document.getElementById('mainBtn');
    const frame = document.getElementById('scannerFrame');
    const placeholder = document.getElementById('placeholder');
    const dot = document.getElementById('statusDot');

    if (scanner) {
      scanner.stop().then(() => { scanner.clear(); scanner = null; });
    }

    frame.classList.remove('scanning');
    placeholder.style.display = 'flex';
    btn.textContent = 'Ligar câmera';
    btn.classList.remove('stop');
    dot.classList.remove('active');
    scanning = false;
    lastCode = null;
  }

  async function lookupCode(code) {
    if (!code || !code.trim()) return;
    code = code.trim();

    const card = document.getElementById('resultCard');
    const body = document.getElementById('resultBody');
    const bar  = document.getElementById('loadingBar');
    const time = document.getElementById('resultTime');

    card.className = 'result-card visible';
    bar.classList.add('active');
    body.innerHTML = '';
    time.textContent = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

    try {
      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code })
      });

      const data = await res.json();
      bar.classList.remove('active');

      if (!res.ok || data.error) {
        showError(data.error || 'Código não encontrado.');
        return;
      }

      // success
      card.className = 'result-card visible';

      const colorName = data.color || '—';
      const swatch = getColorSwatch(colorName);

      body.innerHTML = `
        <div class="result-field">
          <span class="field-label">Código</span>
          <span class="field-value" style="font-family:'Space Mono',monospace;font-size:13px">${escHtml(data.code || code)}</span>
        </div>
        <div class="result-field">
          <span class="field-label">Nome</span>
          <span class="field-value">${escHtml(data.name || '—')}</span>
        </div>
        <div class="result-field">
          <span class="field-label">Cor</span>
          <span class="field-value color-pill">
            <span class="color-swatch" style="background:${swatch}"></span>
            ${escHtml(colorName)}
          </span>
        </div>
      `;

    } catch (e) {
      bar.classList.remove('active');
      showError('Não foi possível conectar ao servidor. Verifique o webhook.');
    }
  }

  function showError(msg) {
    const card = document.getElementById('resultCard');
    const body = document.getElementById('resultBody');
    card.className = 'result-card visible error';
    body.innerHTML = `
      <div class="result-field">
        <span class="field-label">Erro</span>
        <span class="field-value">${escHtml(msg)}</span>
      </div>`;
  }

  // tenta mapear nomes de cores comuns para hex
  function getColorSwatch(name) {
    const map = {
      'vermelho':'#ff5c5c','red':'#ff5c5c',
      'azul':'#5c9eff','blue':'#5c9eff',
      'verde':'#c8f135','green':'#4caf50',
      'amarelo':'#ffe566','yellow':'#ffe566',
      'roxo':'#b57bee','purple':'#b57bee',
      'laranja':'#ff9940','orange':'#ff9940',
      'branco':'#f0f0f0','white':'#f0f0f0',
      'preto':'#333','black':'#333',
      'rosa':'#ff80b5','pink':'#ff80b5',
      'cinza':'#888','gray':'#888','grey':'#888',
    };
    return map[name.toLowerCase()] || '#555';
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
