<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>QR Lookup · Easyflow</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

:root {
  --bg:      #010910;
  --surface: #0b1a14;
  --border:  #0d2b1e;
  --accent:  #00FFA4;
  --red:     #ff5c5c;
  --text:    #ffffff;
  --muted:   #3d6b52;
  --r:       6px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overscroll-behavior:none; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: max(env(safe-area-inset-top,0px),16px) 20px max(env(safe-area-inset-bottom,0px),24px);
  overflow-x: hidden;
  overflow-y: auto;
}

/* ── HEADER ── */
header {
  width:100%; max-width:420px;
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:14px;
}

.logo-img { height:28px; width:auto; display:block; }

.status-pill {
  display:flex; align-items:center; gap:6px;
  font-family:'Space Mono',monospace;
  font-size:10px; color:var(--muted);
  transition:color .3s;
}
.dot {
  width:7px; height:7px; border-radius:50%;
  background:var(--muted);
  transition:background .3s, box-shadow .3s;
}
.status-pill.on { color:var(--accent); }
.status-pill.on .dot {
  background:var(--accent);
  animation:pulse 1.8s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { box-shadow:0 0 3px var(--accent); }
  50%      { box-shadow:0 0 9px var(--accent); }
}

/* ── TITLES ── */
h1 {
  font-size:clamp(1.6rem,7vw,2.4rem); font-weight:800;
  letter-spacing:-0.03em; line-height:1.05;
  margin-bottom:3px; width:100%; max-width:420px;
}
h1 span { color:var(--accent); }

.subtitle {
  font-family:'Space Mono',monospace;
  font-size:10px; color:var(--muted); letter-spacing:.08em;
  margin-bottom:14px; width:100%; max-width:420px;
}

/* ── SCANNER FRAME ── */
.scanner-wrap { width:100%; max-width:420px; margin-bottom:12px; }

.scanner-frame {
  width:100%; aspect-ratio:1/1;
  background:#000; border-radius:var(--r);
  overflow:hidden; position:relative;
}

/* html5-qrcode container — override its default styling */
#qr-reader {
  position:absolute !important; inset:0 !important;
  width:100% !important; height:100% !important;
  border:none !important;
  background:transparent !important;
}
#qr-reader video {
  width:100% !important; height:100% !important;
  object-fit:cover !important;
  position:absolute !important; inset:0 !important;
}
/* hide ALL built-in UI chrome from html5-qrcode */
#qr-reader__dashboard,
#qr-reader__status_span,
#qr-reader__header_message,
#qr-reader img[alt="Info icon"],
#qr-shaded-region {
  display:none !important;
}
#qr-reader__scan_region {
  position:absolute !important; inset:0 !important;
  min-height:0 !important;
  overflow:hidden !important;
}
#qr-reader__scan_region video {
  width:100% !important; height:100% !important;
  object-fit:cover !important;
  position:absolute !important; inset:0 !important;
}

/* corner brackets */
.br { position:absolute; width:24px; height:24px; border-color:var(--accent); border-style:solid; z-index:4; pointer-events:none; }
.br.tl  { top:10px;    left:10px;   border-width:2px 0 0 2px; }
.br.tr  { top:10px;    right:10px;  border-width:2px 2px 0 0; }
.br.bl  { bottom:10px; left:10px;   border-width:0 0 2px 2px; }
.br.br2 { bottom:10px; right:10px;  border-width:0 2px 2px 0; }

.scan-line {
  position:absolute; left:10px; right:10px; height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  z-index:3; opacity:0; pointer-events:none; transition:opacity .3s;
}
.scanning .scan-line { opacity:1; animation:scanMove 2s ease-in-out infinite; }
@keyframes scanMove { 0%{top:10px;} 100%{top:calc(100% - 10px);} }

.flash {
  position:absolute; inset:0;
  background:var(--accent); opacity:0;
  z-index:5; pointer-events:none; border-radius:var(--r);
}
.flash.go { animation:flashAnim .3s ease-out forwards; }
@keyframes flashAnim { 0%{opacity:.4;} 100%{opacity:0;} }

.placeholder {
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
  color:var(--muted); font-family:'Space Mono',monospace;
  font-size:11px; letter-spacing:.08em;
  z-index:2; background:var(--surface);
}
.placeholder svg { opacity:.18; }

/* ── MAIN BUTTON ── */
.btn {
  width:100%; max-width:420px;
  padding:15px 20px; min-height:52px;
  background:var(--accent); color:#010910;
  border:none; border-radius:var(--r);
  font-family:'Syne',sans-serif; font-size:15px; font-weight:700; letter-spacing:.04em;
  cursor:pointer; margin-bottom:12px;
  touch-action:manipulation;
  transition:opacity .15s, transform .1s;
  display:flex; align-items:center; justify-content:center; gap:10px;
}
.btn:active:not(:disabled) { transform:scale(.97); opacity:.85; }
.btn.stop   { background:var(--surface); color:var(--text); border:1px solid var(--border); }
.btn:disabled { opacity:.55; cursor:default; }

.spinner {
  display:none;
  width:15px; height:15px; border-radius:50%;
  border:2px solid rgba(1,9,16,.2);
  border-top-color:#010910;
  animation:spin .7s linear infinite;
  flex-shrink:0;
}
.btn.stop .spinner { border-color:rgba(255,255,255,.15); border-top-color:var(--text); }
.btn.loading .spinner { display:block; }
@keyframes spin { to{transform:rotate(360deg);} }

/* ── RESULT CARD ── */
.result-card {
  width:100%; max-width:420px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r); overflow:hidden;
  display:none; margin-bottom:12px;
}
.result-card.visible { display:block; animation:slideUp .3s cubic-bezier(.16,1,.3,1); }
@keyframes slideUp { from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:translateY(0);} }

.result-tag {
  padding:7px 14px; background:var(--border);
  font-family:'Space Mono',monospace; font-size:10px;
  letter-spacing:.12em; color:var(--muted); text-transform:uppercase;
  display:flex; justify-content:space-between;
}
.result-card.error .result-tag { background:rgba(255,92,92,.12); color:var(--red); }

.loading-bar { height:2px; background:var(--border); overflow:hidden; display:none; }
.loading-bar.active { display:block; }
.loading-bar::after {
  content:''; display:block; width:40%; height:100%;
  background:var(--accent); animation:lbar .9s ease-in-out infinite;
}
@keyframes lbar { 0%{margin-left:-40%;} 100%{margin-left:100%;} }

.result-body { padding:16px; }

.result-field {
  display:flex; justify-content:space-between; align-items:center;
  padding:9px 0; border-bottom:1px solid var(--border);
}
.result-field:last-child { border-bottom:none; }

.field-label {
  font-family:'Space Mono',monospace; font-size:10px;
  color:var(--muted); letter-spacing:.1em; text-transform:uppercase;
  flex-shrink:0; margin-right:12px;
}
.field-value { font-size:15px; font-weight:700; text-align:right; }
.field-value.mono { font-family:'Space Mono',monospace; font-size:13px; }
.result-card.error .field-value { color:var(--red); }

.color-pill { display:flex; align-items:center; gap:8px; justify-content:flex-end; }
.swatch { width:14px; height:14px; border-radius:50%; border:1px solid rgba(255,255,255,.1); flex-shrink:0; }

/* ── NEXT BUTTON ── */
.btn-next {
  display:none; align-items:center; justify-content:center; gap:8px;
  width:100%; padding:14px;
  background:var(--accent); color:#010910;
  border:none; font-family:'Syne',sans-serif;
  font-size:14px; font-weight:700; letter-spacing:.04em;
  cursor:pointer; touch-action:manipulation;
  transition:opacity .15s, transform .1s;
}
.btn-next:active { opacity:.8; transform:scale(.98); }

/* ── MANUAL INPUT ── */
.manual-section { width:100%; max-width:420px; margin-top:4px; margin-bottom:20px; }

.divider {
  display:flex; align-items:center; gap:10px; margin-bottom:12px;
  color:var(--muted); font-family:'Space Mono',monospace;
  font-size:10px; letter-spacing:.1em;
}
.divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }

.input-row { display:flex; gap:8px; }

input[type="text"] {
  flex:1; padding:13px 14px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r); color:var(--text);
  font-family:'Space Mono',monospace; font-size:13px;
  outline:none; transition:border-color .2s;
  -webkit-appearance:none;
}
input[type="text"]:focus { border-color:var(--accent); }
input[type="text"]::placeholder { color:var(--muted); }

.btn-sm {
  padding:13px 16px; min-height:48px;
  background:var(--surface); color:var(--text);
  border:1px solid var(--border); border-radius:var(--r);
  font-family:'Syne',sans-serif; font-size:13px; font-weight:700;
  cursor:pointer; white-space:nowrap;
  touch-action:manipulation;
  transition:border-color .2s, color .2s;
}
.btn-sm:active { border-color:var(--accent); color:var(--accent); }
</style>
</head>
<body>

<header>
  <img src="https://raw.githubusercontent.com/easylabs26/jundiaicolortag/main/Easy-Fundo_Preto.svg"
       alt="Easyflow" class="logo-img">
  <div class="status-pill" id="statusPill">
    <div class="dot"></div>
    <span id="statusTxt">OFF</span>
  </div>
</header>

<h1>Scan &amp;<br><span>Lookup</span></h1>
<p class="subtitle">// aponte a câmera para o QR code</p>

<div class="scanner-wrap">
  <div class="scanner-frame" id="scannerFrame">
    <div class="br tl"></div><div class="br tr"></div>
    <div class="br bl"></div><div class="br br2"></div>
    <div class="scan-line"></div>
    <div class="flash" id="flashEl"></div>
    <div id="qr-reader"></div>
    <div class="placeholder" id="placeholder">
      <svg width="44" height="44" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="6" y="6" width="14" height="14" rx="1"/>
        <rect x="28" y="6" width="14" height="14" rx="1"/>
        <rect x="6" y="28" width="14" height="14" rx="1"/>
        <rect x="9" y="9" width="8" height="8" fill="currentColor" stroke="none" rx="0.5"/>
        <rect x="31" y="9" width="8" height="8" fill="currentColor" stroke="none" rx="0.5"/>
        <rect x="9" y="31" width="8" height="8" fill="currentColor" stroke="none" rx="0.5"/>
        <path d="M28 28h4v4h-4zM36 28h4v4h-4zM32 32h4v4h-4zM28 36h4v4h-4zM36 36h4v4h-4z"/>
      </svg>
      <span>câmera desligada</span>
    </div>
  </div>
</div>

<button class="btn" id="mainBtn">
  <span class="spinner" id="btnSpinner"></span>
  <span id="btnLabel">Ligar câmera</span>
</button>

<div class="result-card" id="resultCard">
  <div class="result-tag">
    <span>RESULTADO</span>
    <span id="resultTime"></span>
  </div>
  <div class="loading-bar" id="loadingBar"></div>
  <div class="result-body" id="resultBody"></div>
  <button class="btn-next" id="nextBtn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 12h14M13 6l6 6-6 6"/>
    </svg>
    Próximo
  </button>
</div>

<div class="manual-section">
  <div class="divider">ou digite o código</div>
  <div class="input-row">
    <input type="text" id="manualInput" placeholder="ex: ABC-001"
           autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button class="btn-sm" id="searchBtn">Buscar</button>
  </div>
</div>

<!-- DEBUG LOG (remover depois) -->
<div id="debugLog" style="width:100%;max-width:420px;margin-top:8px;padding:10px;background:#0b1a14;border:1px solid #0d2b1e;border-radius:6px;font-family:'Space Mono',monospace;font-size:10px;color:#3d6b52;max-height:200px;overflow-y:auto;word-break:break-all;white-space:pre-wrap;"></div>

<!-- html5-qrcode via CDN -->
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script>
// ── DEBUG
const debugEl = document.getElementById('debugLog');
function dbg(msg) {
  const ts = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  debugEl.textContent += `[${ts}] ${msg}\n`;
  debugEl.scrollTop = debugEl.scrollHeight;
  console.log('[DBG]', msg);
}
dbg('v9 loaded. UA: ' + navigator.userAgent.slice(0,80));
dbg('Protocol: ' + location.protocol + ' Host: ' + location.hostname);

// ── CONFIG
const WEBHOOK_URL = 'https://novo1-n8n.dpxjlg.easypanel.host/webhook/qr-lookup';

// ── STATE
let scanning = false;
let busy     = false;
let lastCode = null;
let html5Qr  = null;

// ── DOM REFS
const scanFrame   = document.getElementById('scannerFrame');
const placeholder = document.getElementById('placeholder');
const mainBtn     = document.getElementById('mainBtn');
const btnLabel    = document.getElementById('btnLabel');
const btnSpinner  = document.getElementById('btnSpinner');
const statusPill  = document.getElementById('statusPill');
const statusTxt   = document.getElementById('statusTxt');
const flashEl     = document.getElementById('flashEl');
const resultCard  = document.getElementById('resultCard');
const resultBody  = document.getElementById('resultBody');
const loadingBar  = document.getElementById('loadingBar');
const resultTime  = document.getElementById('resultTime');
const nextBtn     = document.getElementById('nextBtn');
const manualInput = document.getElementById('manualInput');
const searchBtn   = document.getElementById('searchBtn');

// ── EVENTS
mainBtn.addEventListener('click', handleMainBtn);
nextBtn.addEventListener('click', handleNext);
searchBtn.addEventListener('click', () => lookupCode(manualInput.value));
manualInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { lookupCode(manualInput.value); manualInput.blur(); }
});

// ── BUTTON HANDLER
async function handleMainBtn() {
  if (busy) return;
  busy = true;
  try {
    if (scanning) await stopScanner();
    else          await startScanner();
  } catch(e) {
    showError('Erro inesperado: ' + e.message);
    setBtn('idle');
  } finally {
    busy = false;
  }
}

// ── NEXT
function handleNext() {
  resultCard.className = 'result-card';
  resultBody.innerHTML = '';
  nextBtn.style.display = 'none';
  lastCode = null;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── SET BUTTON STATE
function setBtn(state) {
  mainBtn.disabled = false;
  mainBtn.classList.remove('stop', 'loading');
  btnSpinner.style.display = 'none';

  if (state === 'loading') {
    mainBtn.disabled = true;
    mainBtn.classList.add('loading');
    btnSpinner.style.display = 'block';
    btnLabel.textContent = 'Aguarde...';
  } else if (state === 'stop') {
    mainBtn.classList.add('stop');
    btnLabel.textContent = 'Parar câmera';
  } else {
    btnLabel.textContent = 'Ligar câmera';
  }
}

// ── START SCANNER
async function startScanner() {
  setBtn('loading');
  dbg('startScanner() called');

  if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
    showError('Câmera requer HTTPS. Acesse via https://');
    dbg('FAIL: not HTTPS');
    setBtn('idle'); return;
  }

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showError('Seu browser não suporta acesso à câmera. Use Safari ou Chrome atualizado.');
    dbg('FAIL: no mediaDevices');
    setBtn('idle'); return;
  }

  try {
    html5Qr = new Html5Qrcode("qr-reader");
    dbg('Html5Qrcode instance created');

    // Get available cameras
    const devices = await Html5Qrcode.getCameras();
    dbg('Cameras found: ' + devices.length + ' → ' + devices.map(d => d.label || d.id).join(', '));
    if (!devices || devices.length === 0) {
      showError('Nenhuma câmera encontrada.');
      setBtn('idle'); return;
    }

    // Prefer back/environment camera
    let cameraId = devices[devices.length - 1].id;
    for (const d of devices) {
      if (/back|rear|traseira|environment/i.test(d.label)) {
        cameraId = d.id;
        break;
      }
    }
    dbg('Using camera: ' + cameraId);

    placeholder.style.display = 'none';
    scanFrame.classList.add('scanning');

    let scanCount = 0;
    let failCount = 0;

    await html5Qr.start(
      cameraId,
      {
        fps: 10,
        qrbox: function(viewfinderWidth, viewfinderHeight) {
          const size = Math.floor(Math.min(viewfinderWidth, viewfinderHeight) * 0.75);
          dbg('qrbox calc: vf=' + viewfinderWidth + 'x' + viewfinderHeight + ' box=' + size);
          return { width: size, height: size };
        },
        aspectRatio: 1.0,
        disableFlip: false,
      },
      // onScanSuccess
      (decodedText, decodedResult) => {
        scanCount++;
        dbg('✅ SCAN SUCCESS #' + scanCount + ': "' + decodedText + '" format=' + (decodedResult?.result?.format?.formatName || '?'));
        if (decodedText && decodedText !== lastCode) {
          lastCode = decodedText;
          triggerFlash();
          if (navigator.vibrate) navigator.vibrate(60);
          lookupCode(decodedText);
        } else {
          dbg('(same code as last, skipping lookup)');
        }
      },
      // onScanFailure
      (errorMessage) => {
        failCount++;
        // Log every 50th failure so we know scanning is active
        if (failCount % 50 === 1) {
          dbg('scan attempt #' + failCount + ' (no QR yet): ' + (errorMessage||'').slice(0,60));
        }
      }
    );

    dbg('html5Qr.start() resolved — camera is running');
    setBtn('stop');
    statusPill.classList.add('on');
    statusTxt.textContent = 'ON';
    scanning = true;
    lastCode = null;

  } catch(e) {
    const errStr = (e && e.message) ? e.message : String(e);
    const msg = /NotAllowed|Permission/i.test(errStr)
      ? 'Permissão negada. Vá em Ajustes > Safari (ou Chrome) > Câmera e permita.'
      : 'Câmera indisponível: ' + errStr;
    showError(msg);
    setBtn('idle');
    placeholder.style.display = 'flex';
    scanFrame.classList.remove('scanning');
  }
}

// ── STOP SCANNER
async function stopScanner() {
  scanning = false;
  try {
    if (html5Qr) {
      await html5Qr.stop();
      html5Qr.clear();
    }
  } catch(e) { /* ignore */ }
  html5Qr = null;
  placeholder.style.display = 'flex';
  scanFrame.classList.remove('scanning');
  setBtn('idle');
  statusPill.classList.remove('on');
  statusTxt.textContent = 'OFF';
  lastCode = null;
}

// ── FLASH
function triggerFlash() {
  flashEl.classList.remove('go');
  void flashEl.offsetWidth;
  flashEl.classList.add('go');
}

// ── LOOKUP
async function lookupCode(code) {
  if (!code || !code.trim()) { dbg('lookupCode: empty code, skip'); return; }
  code = code.trim();
  dbg('lookupCode("' + code + '") → POST ' + WEBHOOK_URL);

  resultCard.className = 'result-card visible';
  loadingBar.classList.add('active');
  resultBody.innerHTML = '';
  nextBtn.style.display = 'none';
  resultTime.textContent = new Date().toLocaleTimeString('pt-BR', {
    hour: '2-digit', minute: '2-digit', second: '2-digit'
  });
  setTimeout(() => resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 150);

  try {
    dbg('fetch starting...');
    const res = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code })
    });
    loadingBar.classList.remove('active');
    dbg('fetch done. status=' + res.status + ' ok=' + res.ok);

    const raw = await res.text();
    dbg('response body: ' + raw.slice(0,200));

    let data;
    try { data = JSON.parse(raw); } catch(pe) {
      dbg('JSON parse error: ' + pe.message);
      showError('Resposta inválida do servidor: ' + raw.slice(0,100));
      return;
    }

    if (!res.ok || data.error) {
      showError(data.error || 'Código não encontrado: ' + code);
      return;
    }

    const colorName = data.color || '—';
    resultCard.className = 'result-card visible';
    resultBody.innerHTML = `
      <div class="result-field">
        <span class="field-label">Código</span>
        <span class="field-value mono">${esc(data.code || code)}</span>
      </div>
      <div class="result-field">
        <span class="field-label">Nome</span>
        <span class="field-value">${esc(data.name || '—')}</span>
      </div>
      <div class="result-field">
        <span class="field-label">Cor</span>
        <span class="field-value color-pill">
          <span class="swatch" style="background:${colorHex(colorName)}"></span>
          ${esc(colorName)}
        </span>
      </div>`;
    nextBtn.style.display = 'flex';

  } catch(e) {
    loadingBar.classList.remove('active');
    dbg('❌ fetch FAILED: ' + e.name + ': ' + e.message);
    showError('Sem conexão com o servidor. Erro: ' + e.message);
  }
}

// ── HELPERS
function showError(msg) {
  loadingBar.classList.remove('active');
  resultBody.innerHTML = `
    <div class="result-field">
      <span class="field-label">Erro</span>
      <span class="field-value">${esc(msg)}</span>
    </div>`;
  resultCard.className = 'result-card visible error';
  nextBtn.style.display = 'none';
}

function colorHex(n) {
  const m = {
    vermelho:'#ff5c5c', red:'#ff5c5c',
    azul:'#5c9eff',     blue:'#5c9eff',
    verde:'#7ed957',    green:'#7ed957',
    amarelo:'#ffe566',  yellow:'#ffe566',
    roxo:'#b57bee',     purple:'#b57bee',
    laranja:'#ff9940',  orange:'#ff9940',
    branco:'#f0f0f0',   white:'#f0f0f0',
    preto:'#2a2a2a',    black:'#2a2a2a',
    rosa:'#ff80b5',     pink:'#ff80b5',
    cinza:'#888',       gray:'#888', grey:'#888',
  };
  return m[(n||'').toLowerCase()] || '#555';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
